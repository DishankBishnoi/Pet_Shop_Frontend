<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Suppliers</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        .pagination { justify-content: center; }
        .page-item.disabled .page-link {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">Supplier List</h1>
        <a th:href="@{/suppliers/create}" class="btn btn-success">Add New Supplier</a>
    </div>

    <!-- Search Box with Autocomplete -->
    <div class="mb-3 position-relative">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by Name..." oninput="showSuggestions()" onblur="hideSuggestions()" autocomplete="off">
        <ul id="suggestionList" class="list-group position-absolute w-100" style="z-index: 1000;"></ul>
    </div>

    <!-- Supplier Table -->
    <table class="table table-bordered" id="supplierTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Contact Person</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="supplierTableBody">
        <tr th:each="supplier : ${suppliers}">
            <td th:text="${supplier.id}"></td>
            <td th:text="${supplier.name}"></td>
            <td th:text="${supplier.contactPerson}"></td>
            <td th:text="${supplier.phoneNumber}"></td>
            <td th:text="${supplier.email}"></td>
            <td>
                <a th:href="@{'/suppliers/edit/' + ${supplier.id}}" class="btn btn-primary btn-sm">Edit</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination Controls -->
    <nav>
        <ul class="pagination" id="pagination"></ul>
    </nav>
</div>

<script>
    const rowsPerPage = 15;
    let currentPage = 1;

    document.addEventListener("DOMContentLoaded", () => {
        paginate();
    });

    function paginate() {
        const rows = Array.from(document.querySelectorAll("#supplierTableBody tr"));
        const totalRows = rows.length;
        const totalPages = Math.ceil(totalRows / rowsPerPage);

        rows.forEach((row, index) => {
            row.style.display = (index >= (currentPage - 1) * rowsPerPage && index < currentPage * rowsPerPage) ? "" : "none";
        });

        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        const prevDisabled = currentPage === 1 ? "disabled" : "";
        const nextDisabled = currentPage === totalPages ? "disabled" : "";

        pagination.innerHTML += `<li class="page-item ${prevDisabled}">
            <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Previous</a></li>`;

        for (let i = 1; i <= totalPages; i++) {
            pagination.innerHTML += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
        }

        pagination.innerHTML += `<li class="page-item ${nextDisabled}">
            <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Next</a></li>`;
    }

    function changePage(page) {
        const rows = document.querySelectorAll("#supplierTableBody tr");
        const totalPages = Math.ceil(rows.length / rowsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        paginate();
    }

    function showSuggestions() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#supplierTableBody tr");
        const suggestionList = document.getElementById("suggestionList");
        suggestionList.innerHTML = "";

        const matchedNames = [];

        rows.forEach(row => {
            const name = row.querySelector("td:nth-child(2)").textContent;
            if (name.toLowerCase().includes(input)) {
                matchedNames.push(name);
            }
        });

        if (input.trim() === "" || matchedNames.length === 0) {
            suggestionList.innerHTML = "";
            paginate(); // reset view
            return;
        }

        matchedNames.forEach(name => {
            const li = document.createElement("li");
            li.textContent = name;
            li.classList.add("list-group-item", "list-group-item-action");
            li.onclick = () => {
                document.getElementById("searchInput").value = name;
                suggestionList.innerHTML = "";
                filterTableByName(name);
            };
            suggestionList.appendChild(li);
        });
    }

    function hideSuggestions() {
        setTimeout(() => {
            document.getElementById("suggestionList").innerHTML = "";
        }, 150);
    }

    function filterTableByName(name) {
        const rows = document.querySelectorAll("#supplierTableBody tr");
        rows.forEach(row => {
            const rowName = row.querySelector("td:nth-child(2)").textContent;
            row.style.display = (rowName === name) ? "" : "none";
        });
        document.getElementById("pagination").innerHTML = ""; // hide pagination when filtering
    }
</script>
</body>
</html>
