<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Employee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Edit Employee</h2>
  <form th:action="@{/employees/edit}" th:object="${employee}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-3">
      <label class="form-label">First Name</label>
      <input type="text" th:field="*{firstName}" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Last Name</label>
      <input type="text" th:field="*{lastName}" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Position</label>
      <input type="text" th:field="*{position}" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Hire Date</label>
      <input type="date" th:field="*{hireDate}" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <input type="text" th:field="*{phoneNumber}" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" th:field="*{email}" class="form-control" />
    </div>
    <button type="submit" class="btn btn-dark">Update</button>
    <a href="/employees" class="btn btn-secondary">Cancel</a>
  </form>
</div>
</body>
</html>
