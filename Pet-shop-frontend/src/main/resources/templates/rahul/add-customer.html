<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Customer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Add New Customer</h2>
<form method="post" th:action="@{/add-customer}" th:object="${customerFullDto}">

  <!-- Customer Info -->
  <div class="mb-3">
    <label>First Name:</label>
    <input type="text" th:field="*{firstName}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label>Email:</label>
    <input type="email" th:field="*{email}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label>Phone Number:</label>
    <input type="text" th:field="*{phoneNumber}" class="form-control" required/>
  </div>

  <!-- Address Info -->
  <h4>Address</h4>
  <div class="mb-3">
    <label>Street:</label>
    <input type="text" th:field="*{address.street}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label>City:</label>
    <input type="text" th:field="*{address.city}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label>State:</label>
    <input type="text" th:field="*{address.state}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label>Zip Code:</label>
    <input type="text" th:field="*{address.zipCode}" class="form-control" required/>
  </div>

  <form method="post" th:action="@{/add-customer}" th:object="${customerFullDto}">
    <!-- form fields -->
    <button type="submit" class="btn btn-primary">Save Customer</button>
  </form>
</form>
</body>
</html>
