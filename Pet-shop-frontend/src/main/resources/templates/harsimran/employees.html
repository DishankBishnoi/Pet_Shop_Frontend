<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List of Employees</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        thead { background-color: #212529; color: white; }
        .btn-dark:hover { background-color: #1a1d20; }
        input.form-control { border-color: #ced4da; }

        /* Outline‐dark for ALL pagination links */
        .pagination .page-link {
            border: 1px solid #212529;
            color: #212529;
            background-color: transparent;
            margin: 0 .25rem;
        }
        .pagination .page-link:hover {
            background-color: #212529;
            color: white;
        }
        .pagination .active .page-link {
            background-color: #212529;
            border-color: #212529;
            color: white;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>List of Employees</h2>
        <a href="/employees/add" class="btn btn-dark">Add</a>
    </div>

    <input type="text" id="searchInput"
           class="form-control mb-3"
           placeholder="Search employees..."
           onkeyup="filterTable()">

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th><th>First Name</th><th>Last Name</th><th>Position</th>
            <th>Hire Date</th><th>Phone</th><th>Email</th><th>Actions</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.firstName}"></td>
            <td th:text="${emp.lastName}"></td>
            <td th:text="${emp.position}"></td>
            <td th:text="${emp.hireDate}"></td>
            <td th:text="${emp.phoneNumber}"></td>
            <td th:text="${emp.email}"></td>
            <td>
                <a th:href="@{'/employees/edit/' + ${emp.id}}"
                   class="btn btn-sm btn-dark">Edit</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav aria-label="Employee pagination">
        <ul id="pagination"
            class="pagination justify-content-center"></ul>
    </nav>
</div>

<script>
    const rowsPerPage = 10;
    let currentPage = 1, filteredRows = [];

    function filterTable() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const all = Array.from(document.querySelectorAll("#tableBody tr"));
        filteredRows = all.filter(row =>
            Array.from(row.children).some(td =>
                td.textContent.toLowerCase().includes(term)
            )
        );
        currentPage = 1;
        paginate();
    }

    function paginate() {
        const all = Array.from(document.querySelectorAll("#tableBody tr"));
        const rows = filteredRows.length ? filteredRows : all;
        const totalPages = Math.ceil(rows.length / rowsPerPage);

        all.forEach(r => r.style.display = "none");
        rows.forEach((r, idx) => {
            r.style.display =
                (idx >= (currentPage-1)*rowsPerPage && idx < currentPage*rowsPerPage)
                    ? "" : "none";
        });

        const ul = document.getElementById("pagination");
        ul.innerHTML = "";

        function mk(text, disabled, onClick) {
            const li = document.createElement("li");
            li.className = "page-item" + (disabled ? " disabled" : "");
            const a = document.createElement("a");
            a.className = "page-link";
            a.href = "#";
            a.textContent = text;
            if (!disabled) a.addEventListener("click", e => {
                e.preventDefault(); onClick();
            });
            li.appendChild(a);
            return li;
        }

        ul.appendChild(mk("Prev", currentPage===1, () => {
            currentPage--; paginate();
        }));

        for (let i = 1; i <= totalPages; i++) {
            const li = mk(i, false, () => {
                currentPage = i; paginate();
            });
            if (i === currentPage) li.classList.add("active");
            ul.appendChild(li);
        }

        ul.appendChild(mk("Next", currentPage===totalPages, () => {
            currentPage++; paginate();
        }));
    }

    window.addEventListener("load", () => {
        filteredRows = [];
        paginate();
    });
</script>
</body>
</html>
