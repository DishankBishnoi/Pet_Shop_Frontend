<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Edit Vaccination</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Edit Vaccination</h2>
    <form th:action="@{/vaccinations/edit}" th:object="${vaccination}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" th:field="*{description}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Available</label>
            <select th:field="*{available}" class="form-select">
                <option th:value="true">Yes</option>
                <option th:value="false">No</option>
            </select>
        </div>
        <button type="submit" class="btn btn-dark">Update</button>
        <a href="/vaccinations" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
