<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Edit Pet</h2>
<form th:action="@{/pets/update}" method="post" th:object="${pet}" class="mt-4">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" th:field="*{name}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Breed</label>
        <input type="text" class="form-control" th:field="*{breed}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" th:field="*{category.id}">
            <option value="">Select a category</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${cat.id == pet.category?.id}">
            </option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" class="form-control" th:field="*{age}" min="0" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" class="form-control" th:field="*{price}" step="0.01" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" class="form-control" th:field="*{description}">
    </div>

    <button type="submit" class="btn btn-primary">Update Pet</button>
    <a href="/pets" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
