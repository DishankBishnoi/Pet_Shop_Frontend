<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pet Foods</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        .table-container {
            margin-top: 30px;
        }

        .filter-bar .form-control,
        .filter-bar .form-select {
            min-width: 180px;
        }

        .filter-bar label {
            font-weight: 600;
            margin-right: 8px;
            white-space: nowrap; /* ✅ Add this line */
        }


        #rowsPerPage {
            min-width: 100px;
        }

        .btn-success {
            white-space: nowrap;
        }


        @media (max-width: 768px) {
            .filter-bar .row {
                flex-direction: column;
            }
            .filter-bar .col-sm-4,
            .filter-bar .col-sm-auto {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Pet Food List</h2>
        <a href="/" class="btn btn-outline-dark">🏠 Home</a>
    </div>


    <div class="filter-bar mb-3">
        <!-- Row 1: Search, Filter, Sort -->
        <div class="row g-2 w-100 align-items-center mb-2">
            <div class="col-sm-4">
                <input type="text" class="form-control" id="searchInput" placeholder="Search by name...">
            </div>
            <div class="col-sm-4">
                <select class="form-select" id="typeFilter">
                    <option value="">Filter by type</option>
                    <option value="dry">Dry</option>
                    <option value="wet">Wet</option>
                </select>
            </div>
            <div class="col-sm-4">
                <select class="form-select" id="priceSort">
                    <option value="">Sort by price</option>
                    <option value="asc">Low to High</option>
                    <option value="desc">High to Low</option>
                </select>
            </div>
        </div>

        <!-- Row 2: Rows per page + Add button -->
        <div class="row w-100 justify-content-between align-items-center">
            <div class="col-sm-auto d-flex align-items-center">
                <label for="rowsPerPage" class="me-2 fw-semibold">Show rows per page:</label>
                <select class="form-select" id="rowsPerPage">
                    <option value="all">All</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                </select>
            </div>
            <div class="col-sm-auto">
                <a href="/petfoods/create" class="btn btn-success">+ Add New Pet Food</a>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table class="table table-bordered table-striped mt-3">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Type</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Edit</th>
            </tr>
            </thead>
            <tbody id="petFoodTableBody">
            <!-- Rows populated by JavaScript -->
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-center mt-3" id="pagination">
        <!-- Pagination buttons will appear here -->
    </div>
</div>

<script th:inline="javascript">
    let originalData = /*[[${petFoods}]]*/ [];
    let currentPage = 1;
    let rowsPerPage = 'all';

    const tableBody = document.getElementById("petFoodTableBody");
    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");
    const priceSort = document.getElementById("priceSort");
    const rowsPerPageSelect = document.getElementById("rowsPerPage");
    const pagination = document.getElementById("pagination");

    function populateCustomTypes(data) {
        const existingTypes = new Set(["dry", "wet"]);
        data.forEach(item => {
            const typeLower = item.type.toLowerCase();
            if (!existingTypes.has(typeLower)) {
                const option = document.createElement("option");
                option.value = typeLower;
                option.textContent = item.type;
                typeFilter.appendChild(option);
                existingTypes.add(typeLower);
            }
        });
    }

    function renderTable(data) {
        tableBody.innerHTML = "";

        let filteredData = data.filter(item =>
            item.name.toLowerCase().includes(searchInput.value.toLowerCase())
        );

        if (typeFilter.value) {
            filteredData = filteredData.filter(item => item.type.toLowerCase() === typeFilter.value.toLowerCase());
        }

        if (priceSort.value === "asc") {
            filteredData.sort((a, b) => a.price - b.price);
        } else if (priceSort.value === "desc") {
            filteredData.sort((a, b) => b.price - a.price);
        }

        let pageCount = 1;
        let start = 0, end = filteredData.length;

        if (rowsPerPage !== "all") {
            const perPage = parseInt(rowsPerPage);
            pageCount = Math.ceil(filteredData.length / perPage);
            start = (currentPage - 1) * perPage;
            end = start + perPage;
        }

        const paginatedData = filteredData.slice(start, end);

        for (let item of paginatedData) {
            tableBody.innerHTML += `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.brand}</td>
                    <td>${item.type}</td>
                    <td>${item.quantity}</td>
                    <td>${item.price}</td>
                    <td><a href="/petfoods/edit/${item.id}" class="btn btn-sm btn-primary">Edit</a></td>
                </tr>
            `;
        }

        renderPagination(pageCount);
    }

    function renderPagination(pageCount) {
        pagination.innerHTML = "";
        if (rowsPerPage === "all" || pageCount <= 1) return;

        if (currentPage > 1) {
            pagination.innerHTML += `<button class="btn btn-outline-secondary me-1" onclick="changePage(${currentPage - 1})">Prev</button>`;
        }

        for (let i = 1; i <= pageCount; i++) {
            pagination.innerHTML += `<button class="btn ${i === currentPage ? 'btn-secondary' : 'btn-outline-secondary'} me-1" onclick="changePage(${i})">${i}</button>`;
        }

        if (currentPage < pageCount) {
            pagination.innerHTML += `<button class="btn btn-outline-secondary" onclick="changePage(${currentPage + 1})">Next</button>`;
        }
    }

    function changePage(page) {
        currentPage = page;
        renderTable(originalData);
    }

    searchInput.addEventListener("input", () => {
        currentPage = 1;
        renderTable(originalData);
    });

    typeFilter.addEventListener("change", () => {
        currentPage = 1;
        renderTable(originalData);
    });

    priceSort.addEventListener("change", () => {
        currentPage = 1;
        renderTable(originalData);
    });

    rowsPerPageSelect.addEventListener("change", (e) => {
        currentPage = 1;
        rowsPerPage = e.target.value;
        renderTable(originalData);
    });

    document.addEventListener("DOMContentLoaded", () => {
        populateCustomTypes(originalData);
        renderTable(originalData);
    });
</script>
</body>
</html>
