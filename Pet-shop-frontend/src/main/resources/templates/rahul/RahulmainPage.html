<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">

    <!-- Header with Add Button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Customer Summary</h2>
        <a th:href="@{/add-customer}" class="btn btn-success">Add Customer</a>
    </div>

    <!-- Customer Table -->
    <table class="table table-bordered table-striped">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Transactions</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td th:text="${customer.id}">ID</td>
            <td th:text="${customer.firstName + ' ' + customer.lastName}">Name</td>
            <td th:text="${customer.email}">Email</td>
            <td th:text="${customer.phoneNumber}">Phone</td>
            <td>
                <div th:if="${customer.address != null}">
                    <div th:text="${customer.address.street}">Street</div>
                    <div th:text="${customer.address.city}">City</div>
                    <div th:text="${customer.address.state}">State</div>
                    <div th:text="${customer.address.zipCode}">Zip</div>
                </div>
            </td>
            <td>
                <ul th:if="${customer.transactions != null}">
                    <li th:each="tx : ${customer.transactions}" class="mb-2">
                        <div><strong>Date:</strong> <span th:text="${tx.transactionDate}">Date</span></div>
                        <div><strong>Amount:</strong> ₹<span th:text="${tx.amount}">Amount</span></div>
                        <div><strong>Status:</strong> <span th:text="${tx.transactionStatus}">Status</span></div>
                    </li>
                </ul>
            </td>
            <td>
                <a th:href="@{'/customer/edit/' + ${customer.id}}" class="btn btn-sm btn-primary">Edit</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/customersummary(page=${prevPage})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${pages}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/customersummary(page=${i})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/customersummary(page=${nextPage})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
