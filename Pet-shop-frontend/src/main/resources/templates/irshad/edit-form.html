<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Grooming Service</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientShift {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.5s ease-in-out;
      backdrop-filter: blur(20px);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .card-header {
      background: linear-gradient(135deg, #4e73df, #6c63ff);
      color: white;
      font-size: 1.7rem;
      font-weight: bold;
      text-align: center;
      border-radius: 16px 16px 0 0;
      padding: 1.2rem;
      box-shadow: inset 0 -1px 5px rgba(0, 0, 0, 0.1);
    }

    .form-label {
      color: #f8f9fa;
      font-weight: 600;
    }

    .form-control, .form-select, textarea {
      background-color: #2e2e4d;
      color: #ffffff;
      border: 1px solid #555;
      border-radius: 10px;
      transition: all 0.3s ease-in-out;
    }

    .form-control::placeholder,
    textarea::placeholder {
      color: #ccc;
      opacity: 0.7;
    }

    .form-control:focus,
    .form-select:focus,
    textarea:focus {
      background-color: #3d3d5c;
      border-color: #6c63ff;
      box-shadow: 0 0 10px rgba(108, 99, 255, 0.4);
    }

    .btn-success {
      background: linear-gradient(to right, #00c9a7, #17a673);
      border: none;
      font-weight: 500;
      border-radius: 10px;
      padding: 10px 25px;
      color: white;
      transition: all 0.3s ease-in-out;
    }

    .btn-success:hover {
      background: linear-gradient(to right, #17a673, #00c9a7);
      box-shadow: 0 8px 15px rgba(28, 200, 138, 0.4);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: #6c757d;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 25px;
      transition: all 0.3s ease-in-out;
    }

    .btn-secondary:hover {
      background-color: #5a6268;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(108, 117, 125, 0.3);
    }

    .icon-header {
      margin-right: 10px;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header">
          <i class="bi bi-pencil-square icon-header"></i> Edit Grooming Service
        </div>
        <div class="card-body p-4">
          <form th:action="@{/grooming-services/update}" th:object="${service}" method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
              <label class="form-label">Service Name</label>
              <input type="text" th:field="*{name}" class="form-control" required placeholder="Enter service name" />
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea th:field="*{description}" class="form-control" rows="3" required placeholder="Enter service description"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Price (INR)</label>
              <input type="number" step="0.01" th:field="*{price}" class="form-control" required placeholder="Enter price" />
            </div>

            <div class="mb-3">
              <label class="form-label">Available</label>
              <select th:field="*{available}" class="form-select">
                <option th:value="true" th:text="'Yes'"></option>
                <option th:value="false" th:text="'No'"></option>
              </select>
            </div>

            <div class="d-flex justify-content-between">
              <a th:href="@{/grooming-services}" class="btn btn-secondary">
                <i class="bi bi-arrow-left-circle"></i> Cancel
              </a>
              <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Update
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
