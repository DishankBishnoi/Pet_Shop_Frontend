<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Customer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Edit Customer</h2>

  <!-- ✅ Route goes to your frontend controller, NOT backend API -->
  <form th:action="@{'/customer/update/' + ${customerFullDto.id}}"
        th:object="${customerFullDto}"
        method="post">




  <!-- ✅ For Spring PUT support via POST -->
    <input type="hidden" name="_method" value="put"/>

    <!-- Customer Fields -->
    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>First Name</label>
      <input type="text" th:field="*{firstName}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>Last Name</label>
      <input type="text" th:field="*{lastName}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>Phone Number</label>
      <input type="text" th:field="*{phoneNumber}" class="form-control" required/>
    </div>

    <!-- Address Fields -->
    <h4>Address</h4>
    <div class="mb-3">
      <label>Street</label>
      <input type="text" th:field="*{address.street}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>City</label>
      <input type="text" th:field="*{address.city}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>State</label>
      <input type="text" th:field="*{address.state}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>Zip Code</label>
      <input type="text" th:field="*{address.zipCode}" class="form-control" required/>
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
  </form>
</div>
</body>
</html>
