<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Grooming Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #1e1e2f, #2a2a40);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: #2c2f48;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            border-radius: 20px 20px 0 0;
            text-align: center;
            padding: 1.5rem;
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.05);
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.75rem;
        }

        .form-label {
            font-weight: 600;
            color: #d1d1d1;
        }

        .form-control {
            background-color: #1e1e2f;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #4e73df;
            box-shadow: 0 0 8px rgba(78, 115, 223, 0.5);
            background-color: #26263a;
            color: #ffffff;
        }

        .form-check-input {
            background-color: #1e1e2f;
            border: 1px solid #555;
            transform: scale(1.2);
            margin-right: 10px;
        }

        .form-check-label {
            color: #d1d1d1;
        }

        .btn-primary {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s ease-in-out;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(28, 200, 138, 0.3);
        }

        .error-message {
            font-size: 15px;
            font-weight: 500;
            color: #ff6b6b;
        }

        .shadow-wrapper {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-wrapper">
                <div class="card-header">
                    <h3>✨ Add New Grooming Service</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/grooming-services/save}" th:object="${service}" method="post" class="row g-4">

                        <div class="col-md-6">
                            <label for="id" class="form-label">Service ID</label>
                            <input type="number" id="id" class="form-control" th:field="*{id}" required />
                        </div>

                        <div class="col-md-6">
                            <label for="name" class="form-label">Service Name</label>
                            <input type="text" id="name" class="form-control" th:field="*{name}" required />
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">Description</label>
                            <textarea id="description" class="form-control" th:field="*{description}" rows="3" placeholder="Write something..."></textarea>
                        </div>

                        <div class="col-md-6">
                            <label for="price" class="form-label">Price (INR)</label>
                            <input type="number" step="0.01" id="price" class="form-control" th:field="*{price}" required />
                        </div>

                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check">
                                <input type="checkbox" id="available" class="form-check-input" th:field="*{available}" />
                                <label for="available" class="form-check-label">Available</label>
                            </div>
                        </div>

                        <div class="col-12 text-center">
                            <button type="submit" class="btn btn-primary">💾 Save Service</button>
                        </div>

                        <div class="col-12" th:if="${error}">
                            <p class="text-danger text-center mt-2 error-message" th:text="${error}"></p>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
