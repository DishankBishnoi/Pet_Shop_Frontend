<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Pet Food</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Edit Pet Food</h2>
  <form th:action="@{'/petfoods/update/' + ${petFood.id}}" th:object="${petFood}" method="post">
    <div class="row mb-3">
      <label class="col-sm-2 col-form-label">Name</label>
      <div class="col-sm-6">
        <input type="text" th:field="*{name}" class="form-control"/>
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-sm-2 col-form-label">Brand</label>
      <div class="col-sm-6">
        <input type="text" th:field="*{brand}" class="form-control"/>
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-sm-2 col-form-label">Type</label>
      <div class="col-sm-6">
        <input type="text" th:field="*{type}" class="form-control"/>
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-sm-2 col-form-label">Quantity</label>
      <div class="col-sm-6">
        <input type="number" th:field="*{quantity}" class="form-control"/>
      </div>
    </div>
    <div class="row mb-4">
      <label class="col-sm-2 col-form-label">Price</label>
      <div class="col-sm-6">
        <input type="number" step="0.01" th:field="*{price}" class="form-control"/>
      </div>
    </div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="/petfoods" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
</body>
</html>
