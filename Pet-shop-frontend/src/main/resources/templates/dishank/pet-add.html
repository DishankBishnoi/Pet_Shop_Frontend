<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Add Pet</h2>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/pets/add}" method="post" th:object="${pet}" class="mt-4" id="addPetForm">

    <!-- ✅ Pet ID Field -->
    <div class="mb-3">
        <label class="form-label">Pet ID <span class="text-danger">*</span></label>
        <input type="number" class="form-control" th:field="*{id}" required min="1" placeholder="Enter unique Pet ID">
        <div class="text-danger" th:errors="*{id}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" th:field="*{name}" required maxlength="100">
        <div class="text-danger" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Breed <span class="text-danger">*</span></label>
        <input type="text" class="form-control" th:field="*{breed}" required maxlength="100">
        <div class="text-danger" th:errors="*{breed}"></div>
    </div>
    <div class="mb-3">
        <label class="form-label">Category <span class="text-danger">*</span></label>
        <select class="form-select" th:field="*{category.id}" required>
            <option value="">Select a category</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}">
            </option>
        </select>
        <div class="text-danger" th:errors="*{category.id}"></div>
    </div>
    <div class="mb-3">
        <label class="form-label">Age <span class="text-danger">*</span></label>
        <input type="number" class="form-control" th:field="*{age}" required min="0">
        <div class="text-danger" th:errors="*{age}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Price <span class="text-danger">*</span></label>
        <input type="number" class="form-control" th:field="*{price}" required min="0.01" step="0.01">
        <div class="text-danger" th:errors="*{price}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" class="form-control" th:field="*{description}" maxlength="255">
        <div class="text-danger" th:errors="*{description}"></div>
    </div>



    <button type="submit" class="btn btn-primary">Add Pet</button>
    <a href="/pets" class="btn btn-secondary">Cancel</a>
</form>

<script>
    document.getElementById('addPetForm').addEventListener('submit', function(event) {
        const form = event.target;
        form.classList.add('was-validated');
    });
</script>
</body>
</html>
